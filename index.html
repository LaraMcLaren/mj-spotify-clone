<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Player - The King of Pop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-crown"></i>
                <span>Indran's Playlist</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="active"><i class="fa-solid fa-house"></i> Home</a>
                <a href="#"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
                <a href="#"><i class="fa-solid fa-book-open"></i> Your Library</a>
            </nav>
            <div class="playlists">
                <h3>Playlists</h3>
                <ul>
                    <li>The Hits</li>
                    <li>Moonwalk Mix</li>
                    <li>Smooth Vibes</li>
                    <li>Thriller Night</li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-nav">
                <div class="nav-arrows">
                    <button class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="user-profile">
                    <button class="upgrade-btn">Explore</button>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </div>

            <!-- Artist Header -->
            <div class="artist-header">
                <div class="header-bg"></div>
                <div class="header-img-full"></div>
                <div id="sparks-container"></div>
                <div class="header-overlay"></div>
                <div class="header-content">
                    <div class="verified">
                        <i class="fa-solid fa-music"></i> Public Playlist
                    </div>
                    <div class="name-with-crown">
                        <i class="fa-solid fa-crown crown-above"></i>
                        <h1 class="artist-name">INDRAN <span class="sub-name">// Moonwalk Mafia</span></h1>
                    </div>
                    <p class="monthly-listeners">Michael Jackson • 12 tracks</p>
                </div>
            </div>

            <div class="action-bar">
                <button class="play-all-btn" id="master-play"><i class="fa-solid fa-play"></i></button>
                <button class="follow-btn">Follow</button>
                <button class="more-btn"><i class="fa-solid fa-ellipsis"></i></button>
            </div>

            <!-- Track List -->
            <div class="tracks-container">
                <div class="track-header">
                    <div class="col-index">#</div>
                    <div class="col-title">Title</div>
                    <div class="col-album">Album</div>
                    <div class="col-duration"><i class="fa-regular fa-clock"></i></div>
                </div>
                <div class="track-list" id="track-list">
                    <!-- Tracks will be injected via JS -->
                </div>
                
                <div class="site-credit">
                    <p>✨ Created by <span>Indira Kumar Panneerselvam</span> ✨</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Bottom Player -->
    <div class="player">
        <div class="player-left">
            <div class="album-art-wrapper">
                <img src="assets/mj_album_art.png" alt="Album Art" class="current-album-art" id="player-art">
            </div>
            <div class="current-track-info">
                <h4 id="player-title">Select a track</h4>
                <p id="player-artist">Michael Jackson</p>
            </div>
            <button class="icon-btn like-btn"><i class="fa-regular fa-heart"></i></button>
        </div>
        
        <div class="player-center">
            <div class="player-controls">
                <button class="icon-btn control-btn"><i class="fa-solid fa-shuffle"></i></button>
                <button class="icon-btn control-btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                <button class="icon-btn play-pause-btn" id="play-pause-btn"><i class="fa-solid fa-play" style="margin-left: 2px;"></i></button>
                <button class="icon-btn control-btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
                <button class="icon-btn control-btn"><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="progress-container">
                <span class="time" id="current-time">0:00</span>
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress" id="progress"></div>
                    </div>
                </div>
                <span class="time" id="total-time">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <i class="fa-solid fa-microphone"></i>
            <i class="fa-solid fa-list-ul"></i>
            <i class="fa-solid fa-laptop-medical"></i>
            <div class="volume-container">
                <i class="fa-solid fa-volume-high"></i>
                <div class="volume-bar">
                    <div class="volume-progress"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-element"></audio>

    <script src="script.js"></script>
</body>
</html>
